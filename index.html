<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ukinote 웹사이트</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin: 0 0 10px 0;
        }
        p {
            color: #666;
            margin: 10px 0;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background-color: #d4edda;
            border-left: 4px solid #28a745;
            text-align: left;
            border-radius: 4px;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 환영합니다!</h1>
        <p>ukinote.github.io에 오신 것을 환영합니다.</p>
        <div class="status">
            <strong>✓ 웹사이트 연결 성공</strong><br>
            GitHub Pages를 통해 정상적으로 배포되고 있습니다.
        </div>
    </div>
</body>
</html>
